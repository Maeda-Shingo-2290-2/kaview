<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>kaview</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>kaview</h1>
        <p id="periodLabel">実現損益ビューア</p>
      </div>
      <div class="header-total" id="headerTotal">--</div>
    </header>

    <main>
      <section class="filters" aria-label="フィルタ">
        <label>
          <span>開始日</span>
          <input id="fromDate" type="date">
        </label>
        <label>
          <span>終了日</span>
          <input id="toDate" type="date">
        </label>
        <label>
          <span>銘柄</span>
          <input id="query" type="search" placeholder="コード / 銘柄名">
        </label>
        <label>
          <span>口座</span>
          <select id="account"></select>
        </label>
        <label>
          <span>信用区分</span>
          <select id="marginType"></select>
        </label>
        <label>
          <span>取引</span>
          <select id="transactionType"></select>
        </label>
        <label>
          <span>損益</span>
          <select id="plType">
            <option value="">全て</option>
            <option value="profit">利益のみ</option>
            <option value="loss">損失のみ</option>
            <option value="flat">ゼロのみ</option>
          </select>
        </label>
        <div class="filter-actions">
          <button id="applyFilters" type="button">更新</button>
          <button id="resetFilters" type="button" class="secondary">リセット</button>
        </div>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="grid two-columns">
        <article class="panel">
          <div class="panel-heading">
            <h2>累積実現損益</h2>
            <div class="segmented" role="group" aria-label="期間">
              <button class="period-button active" data-group-by="day" type="button">日次</button>
              <button class="period-button" data-group-by="month" type="button">月次</button>
            </div>
          </div>
          <div id="cumulativeChart" class="chart"></div>
        </article>
        <article class="panel">
          <div class="panel-heading">
            <h2>期間別実現損益</h2>
          </div>
          <div id="barChart" class="chart"></div>
        </article>
      </section>

      <section class="grid two-columns">
        <article class="panel">
          <div class="panel-heading">
            <h2>利益上位銘柄</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>銘柄</th>
                  <th class="number">取引</th>
                  <th class="number">実現損益</th>
                </tr>
              </thead>
              <tbody id="topSecurities"></tbody>
            </table>
          </div>
        </article>
        <article class="panel">
          <div class="panel-heading">
            <h2>損失上位銘柄</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>銘柄</th>
                  <th class="number">取引</th>
                  <th class="number">実現損益</th>
                </tr>
              </thead>
              <tbody id="worstSecurities"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>銘柄別成績</h2>
          <span id="securityCount" class="muted"></span>
        </div>
        <div class="table-wrap large">
          <table>
            <thead>
              <tr>
                <th>コード</th>
                <th>銘柄名</th>
                <th class="number">取引</th>
                <th class="number">勝率</th>
                <th class="number">平均損益</th>
                <th class="number">実現損益</th>
              </tr>
            </thead>
            <tbody id="securityRows"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>取引一覧</h2>
          <span id="tradeCount" class="muted"></span>
        </div>
        <div class="table-wrap large">
          <table>
            <thead>
              <tr>
                <th>約定日</th>
                <th>コード</th>
                <th>銘柄名</th>
                <th>口座</th>
                <th>信用</th>
                <th>取引</th>
                <th class="number">数量</th>
                <th class="number">単価</th>
                <th class="number">実現損益</th>
              </tr>
            </thead>
            <tbody id="tradeRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
